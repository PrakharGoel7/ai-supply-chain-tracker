services:
  - type: web
    name: ai-supply-chain-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TURSO_DB_URL
        sync: false   # set in Render dashboard: libsql://<db-name>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false   # set in Render dashboard: token from `turso db tokens create <db-name>`
